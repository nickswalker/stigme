<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Tally marks: four vertical strokes crossed by one diagonal -->
  <g stroke="#c4a0ff" stroke-width="3.5" stroke-linecap="round">
    <!-- Four vertical lines -->
    <line x1="12" y1="10" x2="12" y2="38"/>
    <line x1="19" y1="10" x2="19" y2="38"/>
    <line x1="26" y1="10" x2="26" y2="38"/>
    <line x1="33" y1="10" x2="33" y2="38"/>
    <!-- Diagonal crossing stroke -->
    <line x1="8" y1="32" x2="37" y2="14" stroke="#a66eff" stroke-width="3.5"/>
  </g>
</svg>
