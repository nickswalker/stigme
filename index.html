<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Stigme is a fast tally counter PWA for tracking counts, timestamps, notes, and exportable history on your device." />
    <meta name="author" content="Nick Walker" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stigme" />
    <link rel="canonical" href="https://stigme.nickwalker.us/" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="Stigme Tally Counter" />
    <meta property="og:description" content="A fast tally counter PWA that records timestamps, notes, and exportable history." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stigme.nickwalker.us/" />
    <meta property="og:image" content="https://stigme.nickwalker.us/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Stigme Tally Counter" />
    <meta name="twitter:description" content="A fast tally counter PWA that records timestamps, notes, and exportable history." />
    <meta name="twitter:image" content="https://stigme.nickwalker.us/pwa-512x512.png" />
    <title>Stigme Tally Counter</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Stigme",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "iOS, Android, Web",
        "url": "https://stigme.nickwalker.us/",
        "description": "A fast tally counter PWA that records timestamps, notes, and exportable history.",
        "author": {
          "@type": "Person",
          "name": "Nick Walker"
        }
      }
    </script>
    <script>
      window.goatcounter = {
        path: function (p) {
          return "stigme." + p;
        },
      }
      if (window.location.hostname !== "stigme.nickwalker.us") {
        // Load the script but don't auto-count on non-production hosts.
        window.goatcounter = { no_onload: true }
      }
    </script>
    <script async data-goatcounter="https://nickwalker.us/stats/count" src="https://nickwalker.us/stats/count.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
